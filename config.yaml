lookback_days: 7

enabled_sources:
  - crossref
  - openalex
  - publishers
  - semantic_scholar
  - pubmed
  - europe_pmc
  - arxiv
  - doaj
  - biorxiv
  - medrxiv

max_results_per_source:
  crossref: 100
  openalex: 100
  publishers: 30
  semantic_scholar: 80
  pubmed: 100
  europe_pmc: 100
  arxiv: 100
  doaj: 60
  biorxiv: 50
  medrxiv: 50

max_query_terms: 36

max_query_terms_per_source:
  pubmed: 32
  europe_pmc: 28
  arxiv: 32

recent_feed_pages:
  biorxiv: 3
  medrxiv: 3

request_timeout_seconds: 25
request_retry_count: 2
request_retry_sleep_seconds: 1.5
min_relevance_score: 1.0

user_agent: "LiteratureWatcher/0.1 (mailto:your_email@example.com)"
openalex_mailto: "your_email@example.com"

paths:
  data_dir: "data"
  reports_dir: "reports"
  seen_items_file: "seen_items.json"
  latest_results_file: "latest_results.json"

scoring:
  title_multiplier: 3.0
  abstract_multiplier: 1.0

