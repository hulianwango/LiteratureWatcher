request_timeout_seconds: 25
request_retry_count: 2
request_retry_sleep_seconds: 1.5
min_relevance_score: 1.0

user_agent: "LiteratureWatcher/0.1 (mailto:your_email@example.com)"
openalex_mailto: "your_email@example.com"

paths:
  data_dir: "data"
  reports_dir: "reports"
  seen_items_file: "seen_items.json"
  latest_results_file: "latest_results.json"
  cumulative_results_file: "cumulative_results.json"
  word_report_file: "literature_report.docx"
  markdown_report_file: "literature_report.md"
  csv_report_file: "literature_report.csv"

scoring:
  title_multiplier: 3.0
  abstract_multiplier: 1.0

